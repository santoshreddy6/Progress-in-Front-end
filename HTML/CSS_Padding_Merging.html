<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Padding and Margin Practice</title>
    <link rel="stylesheet" href="CSS_Padding_Merging.css">
</head>
<body>

    <header>
        <h1>My Website</h1>
    </header>

    <main>

        <div class="box">
            <h2>Section 1</h2>
            <p>
                This is the first content box. It has padding inside and margin outside.
            </p>
        </div>

        <div class="box">
            <h2>Section 2</h2>
            <p>
                This is the second content box. Margin creates space between the boxes.
            </p>
        </div>

        <div class="box">
            <h2>Section 3</h2>
            <p>
                Padding gives space inside the box while margin gives space outside the box.
            </p>
        </div>

    </main>

    <footer>
        <p>© 2026 My Website</p>
    </footer>

</body>
</html>
