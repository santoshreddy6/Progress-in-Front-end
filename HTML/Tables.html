<!DOCTYPE html>
<html>
<head>
    <title>Table Layout</title>
</head>
<body>

<table border="1" cellspacing="0" width="100%" height="500">

    <tr>
        <td rowspan="2"></td>
        <td colspan="2"></td>
        <td></td>
        <td></td>
    </tr>

    <tr>
        <td></td>
        <td rowspan="2"></td>
        <td></td>
        <td></td>
    </tr>

    <tr>
        <td rowspan="2"></td>
        <td rowspan="2"></td>

        <td colspan="2">
            <table border="1" cellspacing="1" width="80%" height="80%" align="center">
                <tr>
                    <td></td>
                    <td></td>
                </tr>

                <tr>
                    <td></td>
                    <td></td>
                </tr>
            </table>
        </td>
    </tr>

    <tr>
        <td></td>
        <td colspan="2"></td>
    </tr>

</table>

</body>
</html>
