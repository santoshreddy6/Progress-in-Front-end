<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multimedia Integration Assignment</title>
</head>
<body>

    <h1>Multimedia Integration Webpage</h1>

    <!-- Navigation Links -->
    <nav>
        <a href="#image">Image</a> |
        <a href="#audio">Audio</a> |
        <a href="#video">Video</a> |
        <a href="#website">Website</a>
    </nav>

    <hr>

    <!-- Image Section -->
    <section id="image">
        <h2>Image</h2>
        <img src="https://cdn.britannica.com/92/212692-050-D53981F5/labradoodle-dog-stick-running-grass.jpg" alt="Sample Image">
    </section>

    <hr>

    <!-- Audio Section -->
    <section id="audio">
        <h2>Audio</h2>
        <audio controls>
            <source src="I Wanna be yours - Telugu version song - Telugu loop.mp3" type="audio/mpeg">
        </audio>
    </section>

    <hr>

    <!-- Video Section -->
    <section id="video">
        <iframe
                width="560"
                height="315"
                src="https://www.youtube.com/embed/v5LlVB3fqjY"
                title="YouTube video player">
        </iframe>
    </section>

    <hr>

    <!-- Website Section -->
    <section id="website">
        <h2>Website</h2>
        <iframe
            src="https://www.wikipedia.org/"
            width="600"
            height="400"
            title="Wikipedia">
        </iframe>
    </section>

</body>
</html>
