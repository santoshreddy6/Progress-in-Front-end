<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML Table Assignment</title>

<style>
    body{
        font-family: Arial, Helvetica, sans-serif;
        background:#f4f4f4;
        margin:40px;
    }

    table{
        width:900px;
        height:500px;
        border-collapse:collapse;
        margin:auto;
        background:white;
    }

    td{
        border:3px solid black;
        text-align:center;
    }

    .smallTable{
        width:100%;
        height:100%;
        border-collapse:collapse;
    }

    .smallTable td{
        border:3px solid black;
    }
</style>

</head>
<body>

<table>

<tr>
    <td></td>
    <td colspan="2"></td>
    <td></td>
    <td></td>
</tr>

<tr>
    <td></td>
    <td rowspan="2"></td>
    <td rowspan="2"></td>
    <td></td>
    <td></td>
</tr>

<tr>
    <td rowspan="2"></td>
    <td colspan="2"></td>
</tr>

<tr>
    <td colspan="2"></td>

    <td colspan="2" rowspan="2">

        <table class="smallTable">

            <tr>
                <td></td>
                <td></td>
            </tr>

            <tr>
                <td></td>
                <td></td>
            </tr>

        </table>

    </td>
</tr>

<tr>
    <td></td>
    <td></td>
    <td></td>
</tr>

</table>

</body>
</html>
