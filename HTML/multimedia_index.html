<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iframe and Multimedia Integration</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            margin:40px;
            line-height:1.6;
        }

        nav{
            background:#f4f4f4;
            padding:15px;
            border-radius:8px;
        }

        nav a{
            margin-right:20px;
            text-decoration:none;
            color:blue;
            font-weight:bold;
        }

        section{
            margin-top:60px;
        }

        img{
            width:400px;
            border-radius:10px;
        }

        iframe{
            width:100%;
            height:500px;
            border:1px solid #ccc;
        }
    </style>

</head>
<body>

<h1>Iframe and Multimedia Integration Assignment</h1>

<nav>
    <a href="#image">Image</a>
    <a href="#audio">Audio</a>
    <a href="#video">Video</a>
    <a href="#website">Website</a>
</nav>

<section id="image">
    <h2>Image</h2>

    <img src="image.jpg" alt="Sample Image">
</section>

<section id="audio">
    <h2>Audio</h2>

    <audio controls>
        <source src="audio.mp3" type="audio/mpeg">
        
    </audio>
</section>

<section id="video">
    <h2>Video</h2>

    <video width="600" controls>
        <source src="video.mp4" type="video/mp4">
    </video>
</section>

<section id="website">
    <h2>Website</h2>

    <iframe
        src="https://www.wikipedia.org/"
        title="Wikipedia">
    </iframe>
</section>

</body>
</html>
